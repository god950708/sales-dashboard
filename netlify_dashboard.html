<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>영업지원팀 현황 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f5f6fa; color: #1a1a2e; }
  .header { background: #fff; border-bottom: 1px solid #e8eaf0; padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 17px; font-weight: 700; }
  .header p  { font-size: 12px; color: #888; margin-top: 2px; }
  .badge { font-size: 11px; background: #eef4ff; color: #378ADD; padding: 4px 10px; border-radius: 20px; font-weight: 500; }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
  .tabs { display: flex; border-bottom: 2px solid #e8eaf0; margin-bottom: 24px; }
  .tab-btn { background: none; border: none; border-bottom: 3px solid transparent; padding: 10px 20px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; color: #888; cursor: pointer; margin-bottom: -2px; transition: all .2s; white-space: nowrap; }
  .tab-btn.active { color: var(--tc); border-bottom-color: var(--tc); font-weight: 700; }
  .cards { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 28px; }
  .card { background: #fff; border-radius: 12px; padding: 16px 18px; flex: 1; min-width: 120px; border-top: 3px solid var(--ac, #e8eaf0); box-shadow: 0 1px 4px rgba(0,0,0,.05); }
  .card .c-label { font-size: 11px; color: #888; margin-bottom: 6px; }
  .card .c-value { font-size: 22px; font-weight: 700; color: #1a1a2e; }
  .card .c-sub   { font-size: 11px; color: #aaa; margin-top: 4px; }
  .section-title { font-size: 11px; font-weight: 700; color: #999; letter-spacing: .07em; text-transform: uppercase; margin: 28px 0 12px; }
  .chart-wrap { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.05); margin-bottom: 24px; overflow-x: auto; }
  .loading { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; }
  .error   { text-align: center; padding: 40px 20px; color: #e74c3c; font-size: 13px; }
  .footer  { font-size: 11px; color: #bbb; text-align: center; padding: 20px; }
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>영업지원팀 현황 대시보드</h1>
    <p id="updated">데이터 불러오는 중...</p>
  </div>
  <span class="badge">2026</span>
</div>
<div class="container">
  <div id="app"><div class="loading">📊 데이터 불러오는 중...</div></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyLRPJgS-oUvBRZhxUgWgHVsUgreOvZiTW_lGbLLNo9r6g1BBxw2YVv5-UKXAdpA9GmGQ/exec";

const TABS = ["해피콜","큐스코","부재토스","SKY유심","삼쩜삼"];
const TAB_COLORS = ["#378ADD","#1D9E75","#D85A30","#BA7517","#7A4ADD"];
const PALETTE = [
  ["#B5D4F4","#378ADD"],["#9FE1CB","#1D9E75"],
  ["#F5C4B3","#D85A30"],["#FAC775","#BA7517"],
  ["#D4B5F4","#7A4ADD"],["#F4D4B5","#DD8A37"],
];

// 각 탭별 담당자 및 컬럼 설정 (A=0,B=1,C=2,D=3,E=4)
const TAB_CFG = {
  "해피콜":   { names:["허영은","백지연"], tries:[1,3], sucs:[2,4] },
  "큐스코":   { names:["예훈"],           tries:[1],   sucs:[2]   },
  "부재토스": { names:["예훈","지연"],    tries:[1,3], sucs:[2,4] },
  "SKY유심":  { names:["예훈"],           tries:[1],   sucs:[2]   },
  "삼쩜삼":   { names:["예훈","현정"],    tries:[1,3], sucs:[2,4] },
};

let sheetData = {};
let currentTab = 0;
const charts = {};

function n(v) {
  const s = String(v||"").trim();
  if (!s || s==="-") return 0;
  return parseFloat(s.replace(/,/g,""))||0;
}
function pct(s,t){ return t?((s/t)*100).toFixed(1)+"%":"0.0%"; }

function getRows(tabName) {
  const raw = sheetData[tabName] || [];
  // 2행(index 1)부터, 날짜 있고 시도건 있는 행만
  const cfg = TAB_CFG[tabName];
  return raw.slice(1).filter(r => {
    const date = String(r[0]||"").trim();
    if (!date || !/\d+월/.test(date)) return false;
    return cfg.tries.some(t => n(r[t]) > 0);
  });
}

function buildDaily(tabName) {
  const cfg = TAB_CFG[tabName];
  const rows = getRows(tabName);
  return rows.slice(-7).map(r => {
    const dateStr = String(r[0]||"");
    const dm = dateStr.match(/0?(\d+)월\s*0?(\d+)일/);
    const label = dm ? `${dm[1]}/${dm[2]}` : dateStr;
    const obj = { label };
    cfg.names.forEach((nm,i) => {
      obj[nm+"시도"] = n(r[cfg.tries[i]]);
      obj[nm+"성공"] = n(r[cfg.sucs[i]]);
    });
    return obj;
  });
}

function buildMonthly(tabName) {
  const cfg = TAB_CFG[tabName];
  const rows = getRows(tabName);
  const map = {};
  const order = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

  rows.forEach(r => {
    const m = String(r[0]||"").match(/^0?(\d+)월/); // 앞의 0 제거 (03월 → 3월)
    if (!m) return;
    const k = parseInt(m[1]) + "월";
    if (!map[k]) { map[k] = {label:k}; cfg.names.forEach(nm=>{map[k][nm+"시도"]=0;map[k][nm+"성공"]=0;}); }
    cfg.names.forEach((nm,i) => {
      map[k][nm+"시도"] += n(r[cfg.tries[i]]);
      map[k][nm+"성공"] += n(r[cfg.sucs[i]]);
    });
  });

  return order
    .filter(m => map[m] && cfg.names.some(nm => (map[m][nm+"시도"]||0)>0))
    .slice(-3)
    .map(m => map[m]);
}

function makeChart(id, labels, datasets) {
  if (charts[id]) charts[id].destroy();
  const ctx = document.getElementById(id);
  if (!ctx) return;
  charts[id] = new Chart(ctx, {
    type: "bar",
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { font: { family:"Noto Sans KR", size:11 }, boxWidth:12 } },
        tooltip: { titleFont:{family:"Noto Sans KR"}, bodyFont:{family:"Noto Sans KR"} }
      },
      scales: {
        x: { ticks:{ font:{family:"Noto Sans KR",size:10}, maxRotation:40 }, grid:{display:false} },
        y: { ticks:{ font:{family:"Noto Sans KR",size:10}, stepSize:1, callback: v => Number.isInteger(v) ? v+"건" : null }, grid:{color:"rgba(0,0,0,0.05)"}, beginAtZero:true, grace:"10%" }
      }
    }
  });
}

function renderTab(idx) {
  currentTab = idx;
  const tabName = TABS[idx];
  const cfg = TAB_CFG[tabName];
  const tc = TAB_COLORS[idx];
  const daily = buildDaily(tabName);
  const monthly = buildMonthly(tabName);

  // 탭 active
  document.querySelectorAll(".tab-btn").forEach((b,i) => {
    b.classList.toggle("active", i===idx);
    b.style.setProperty("--tc", TAB_COLORS[i]);
  });

  // 담당자 통계 (전체 기준)
  const allRows = getRows(tabName);
  const memberStats = cfg.names.map((nm,i) => ({
    name: nm, color: PALETTE[i][1],
    try: allRows.reduce((s,r)=>s+n(r[cfg.tries[i]]),0),
    suc: allRows.reduce((s,r)=>s+n(r[cfg.sucs[i]]),0),
  }));
  const totalTry = memberStats.reduce((s,m)=>s+m.try,0);
  const totalSuc = memberStats.reduce((s,m)=>s+m.suc,0);

  // 카드
  document.getElementById("cards").innerHTML = `
    <div class="card"><div class="c-label">총 시도건</div><div class="c-value">${totalTry.toLocaleString()}</div><div class="c-sub">전체 누적</div></div>
    <div class="card"><div class="c-label">총 성공건</div><div class="c-value">${totalSuc.toLocaleString()}</div><div class="c-sub">전체 누적</div></div>
    <div class="card"><div class="c-label">전체 성공률</div><div class="c-value">${pct(totalSuc,totalTry)}</div><div class="c-sub">시도 대비</div></div>
    ${memberStats.length > 1 ? memberStats.map(m=>`
      <div class="card" style="--ac:${m.color}">
        <div class="c-label">${m.name}</div>
        <div class="c-value">${pct(m.suc,m.try)}</div>
        <div class="c-sub">시도 ${m.try.toLocaleString()} / 성공 ${m.suc}</div>
      </div>`).join("") : ""}
  `;

  // 일별 차트
  const barDatasets = cfg.names.flatMap((nm,i) => [
    { label:nm+" 시도", data:daily.map(r=>r[nm+"시도"]), backgroundColor:PALETTE[i][0], borderRadius:4 },
    { label:nm+" 성공", data:daily.map(r=>r[nm+"성공"]), backgroundColor:PALETTE[i][1], borderRadius:4 },
  ]);
  makeChart("chartDaily", daily.map(r=>r.label), barDatasets);

  // 해피콜 담당자별 총 시도/성공 차트
  if (tabName === "해피콜") {
    const memberTotalData = memberStats.map((m, i) => ({
      name: m.name,
      시도: allRows.reduce((s, r) => s + n(r[cfg.tries[i]]), 0),
      성공: allRows.reduce((s, r) => s + n(r[cfg.sucs[i]]), 0),
    }));
    makeChart("chartMemberTotal",
      memberTotalData.map(m => m.name),
      [
        { label:"시도", data: memberTotalData.map(m => m.시도), backgroundColor: memberStats.map((_,i) => PALETTE[i][0]), borderRadius:4 },
        { label:"성공", data: memberTotalData.map(m => m.성공), backgroundColor: memberStats.map((_,i) => PALETTE[i][1]), borderRadius:4 },
      ]
    );
  }

  // 담당자별 성공률 차트 (해피콜 제외)
  if (tabName !== "해피콜") {
    makeChart("chartRate",
      memberStats.map(m => m.name),
      [{ label:"성공률 (%)", data: memberStats.map(m => m.try > 0 ? parseFloat(((m.suc/m.try)*100).toFixed(1)) : 0), backgroundColor: memberStats.map(m => m.color), borderRadius:4 }]
    );
  }

  // 일별 날짜 범위 표시
  const dailyLabel = daily.length > 0
    ? `${daily[0].label} ~ ${daily[daily.length-1].label} (${daily.length}일)`
    : "데이터 없음";
  const monthDatasets = cfg.names.flatMap((nm,i) => [
    { label:nm+" 시도", data:monthly.map(r=>r[nm+"시도"]||0), backgroundColor:PALETTE[i][0], borderRadius:4 },
    { label:nm+" 성공", data:monthly.map(r=>r[nm+"성공"]||0), backgroundColor:PALETTE[i][1], borderRadius:4 },
  ]);
  makeChart("chartMonthly", monthly.map(r=>r.label), monthDatasets);
}

function renderApp() {
  document.getElementById("app").innerHTML = `
    <div class="tabs">
      ${TABS.map((t,i)=>`<button class="tab-btn" style="--tc:${TAB_COLORS[i]}" onclick="renderTab(${i})">${t}</button>`).join("")}
    </div>
    <div class="cards" id="cards"></div>
    ${idx === 0 ? `
    <div class="section-title">담당자별 총 시도 / 성공</div>
    <div class="chart-wrap"><canvas id="chartMemberTotal" height="200"></canvas></div>` : ""}
    <div class="section-title">일별 시도 / 성공 (최근 7일)</div>
    <div class="chart-wrap"><canvas id="chartDaily" height="260"></canvas></div>
    <div class="section-title">월별 현황 (최근 3개월)</div>
    <div class="chart-wrap"><canvas id="chartMonthly" height="220"></canvas></div>
    <div class="footer" id="footer"></div>
  `;
  renderTab(0);
}

// JSONP
function handleData(json) {
  try {
    sheetData = json.data || {};
    const now = new Date().toLocaleString("ko-KR");
    document.getElementById("updated").textContent = `마지막 업데이트: ${now}`;
    renderApp();
  } catch(e) {
    document.getElementById("app").innerHTML = `<div class="error">❌ 파싱 실패: ${e.message}</div>`;
  }
}
window.handleData = handleData;

function loadData() {
  const old = document.getElementById("jsonp-script");
  if (old) old.remove();
  const s = document.createElement("script");
  s.id = "jsonp-script";
  s.onerror = () => {
    fetch("https://corsproxy.io/?" + encodeURIComponent(API_URL))
      .then(r=>r.json()).then(json=>handleData(json))
      .catch(err => {
        document.getElementById("app").innerHTML = `<div class="error">❌ 데이터 로드 실패: ${err.message}</div>`;
      });
  };
  s.src = API_URL + "?callback=handleData&t=" + Date.now();
  document.head.appendChild(s);
}

loadData();
</script>
</body>
</html>
